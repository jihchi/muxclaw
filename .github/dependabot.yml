version: 2
updates:
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    commit-message:
      prefix: 'chore'

  - package-ecosystem: 'docker'
    directory: '/container'
    schedule:
      interval: 'weekly'
    commit-message:
      prefix: 'chore'
